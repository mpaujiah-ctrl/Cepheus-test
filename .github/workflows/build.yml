name: Build Cepheus KSUN Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev libelf-dev build-essential git curl zip python3 gcc-aarch64-linux-gnu

      - name: Clone Proton Clang
        run: git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $HOME/proton

      - name: Clone Lineage Kernel
        run: git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_sm8150 kernel

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Patch KernelSU Next
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
          cd ..

      - name: Setup defconfig KSUN
        run: |
          echo "CONFIG_KSU=y" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_KPROBES=y" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_HAVE_KPROBES=y" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_KALLSYMS=y" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_MODULES=y" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_LTO_NONE=y" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_NR_CPUS=8" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_NO_HZ_FULL=n" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_NO_HZ_IDLE=y" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_SCHED_BOOST=n" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_QCOM_PERF_BOOST=n" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_QTI_SCMI_PLAT=n" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_WALT=n" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_SCHED_DEBUG=y" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
          echo "CONFIG_MSM_GENI_IR=n" >> kernel/arch/arm64/configs/vendor/cepheus_defconfig
      
      - name: Debug defconfig
        run: |
          echo "=== CEK 6 CONFIG PENYAKIT ==="
          grep -E "SCHED_BOOST|QCOM_PERF_BOOST|QTI_SCMI_PLAT|WALT|SCHED_DEBUG|MSM_GENI_IR" kernel/arch/arm64/configs/vendor/cepheus_defconfig || true
      
      - name: Build kernel
        run: |
          cd kernel
          export PATH="$HOME/proton/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LD=ld.lld
          export KCFLAGS="-Wno-error"
      
          # 1. HAPUS SOURCE WALT, TAPI SISAIN HEADER KOSONG
          rm -rf kernel/sched/walt.c kernel/sched/walt.h
          mkdir -p include/trace/events/
          echo "" > include/trace/events/walt.h  # <- Kunci utama
          echo "" > kernel/sched/walt.h          # <- Buat core.c
      
          # 2. MATIN BLOK ONEPLUS PAKE #if 0, BUKAN #define
          sed -i 's/if (sched_boost() != FULL_THROTTLE_BOOST ||/#if 0 \/\/ DISABLED ONEPLUS\n if (0 ||/' kernel/sched/fair.c
      
          make O=out CC=clang LD=ld.lld vendor/cepheus_defconfig
      
          # 3. DISABLE CONFIG WALT/EAS
          ./scripts/config --file out/.config -d WALT -d SCHED_WALT -d ENERGY_MODEL -d QCOM_SCHED_WALT -d QTI_SCHED -d SCHED_BOOST -d OPLUS_FEATURE_SCHED_ASSIST
          ./scripts/config --file out/.config -e SCHED_DEBUG
      
          make O=out CC=clang LD=ld.lld -j$(nproc) Image.gz-dtb

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          # Jangan copy dtbo.img biar pake bawaan SparkOS
          # Copy modules kalau ada
          find kernel/out -name '*.ko' -exec cp {} AnyKernel3/modules/system/lib/modules/ \;
          cd AnyKernel3 && zip -r9 ../Cepheus-KSUN-Test.zip *

      - name: Upload artifact   
        uses: actions/upload-artifact@v4
        with:
            name: Cepheus-KSUN-Test
            path: Cepheus-KSUN-Test.zip
