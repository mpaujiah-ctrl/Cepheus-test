name: Build Cepheus KSUN+SUSFS Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev libelf-dev build-essential git curl zip python3 gcc-aarch64-linux-gnu
          sudo apt install -y gcc-arm-linux-gnueabi
          sudo apt install -y libyaml-dev

      - name: Clone Proton Clang
        run: git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $HOME/proton

      - name: Clone Spark Kernel
        run: git clone --depth=1 -b pyro https://github.com/Spark-Devices/android_kernel_xiaomi_cepheus kernel
   
      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Clone SUSFS
        run: |
          git clone --depth=1 --branch kernel-4.14 https://gitlab.com/simonpunk/susfs4ksu.git susfs

      - name: Configure AnyKernel3
        run: |
          cd AnyKernel3
    
          # Disable device check
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          
          # Fix block device path untuk Qualcomm sm8150 (cepheus)
          sed -i 's|block=/dev/block/platform/omap/omap_hsmmc.0/by-name/|block=/dev/block/bootdevice/by-name/|' anykernel.sh
          
          echo "=== Cek anykernel.sh ==="
          grep -E "devicecheck|block=" anykernel.sh | head -10          

      - name: Patch KernelSU Next
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s v1.0.5
          
          rm -rf drivers/staging/kernelsu
          sed -i '/kernelsu/d' drivers/staging/Kconfig
          sed -i '/kernelsu/d' drivers/staging/Makefile

          # Stub path_umount untuk kernel 4.14
          echo 'int path_umount(struct path *path, int flags) { return 0; }' >> fs/namespace.c
          
          cd ..

      - name: Apply SUSFS Patch
        continue-on-error: true
        run: |
          cd kernel
          cp ../susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch .
          patch -p1 < 50_add_susfs_in_kernel-4.14.patch

      - name: Copy SUSFS Files
        run: |
          cd kernel
          cp ../susfs/kernel_patches/fs/susfs.c fs/
          cp ../susfs/kernel_patches/fs/sus_su.c fs/
          cp ../susfs/kernel_patches/include/linux/susfs.h include/linux/
          cp ../susfs/kernel_patches/include/linux/sus_su.h include/linux/
          cp ../susfs/kernel_patches/include/linux/susfs_def.h include/linux/
          echo "=== Verifikasi ==="
          ls -la include/linux/susfs.h
          ls -la fs/susfs.c        

          grep -q "susfs_is_current_ksu_domain" include/linux/susfs.h || \
          cat >> include/linux/susfs.h << 'EOF'

          static inline bool susfs_is_current_ksu_domain(void) { return false; }
          static inline bool susfs_is_current_zygote_domain(void) { return false; }
          EOF

      - name: Fix missing SUSFS symbols
        run: |
          cat > /tmp/fix_susfs_inline.py << 'PYEOF'
          with open('kernel/include/linux/susfs.h', 'r') as f:
              content = f.read()
          
          # Hapus static inline definitions yang konflik
          content = content.replace(
              'static inline bool susfs_is_current_ksu_domain(void) { return false; }',
              ''
          )
          content = content.replace(
              'static inline bool susfs_is_current_zygote_domain(void) { return false; }',
              ''
          )
          print("OK: static inline dihapus dari susfs.h")
          
          with open('kernel/include/linux/susfs.h', 'w') as f:
              f.write(content)
          PYEOF
                    python3 /tmp/fix_susfs_inline.py
                    grep -n "susfs_is_current" kernel/include/linux/susfs.h || true
         
      - name: Debug susfs.h content
        if: always()
        run: |
          cd kernel
          echo "=== susfs.h ==="
          head -50 include/linux/susfs.h
          
      - name: Add SUSFS to Kconfig
        run: |
          cd kernel
          cat >> fs/Kconfig << 'EOF'

          config KSU_SUSFS
          	bool "KernelSU addon - susfs"
          	depends on KSU
          	default y
          	help
          	  Enable susfs support for KernelSU.
          
          config KSU_SUSFS_SUS_PATH
          	bool "Enable sus path"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_SUS_MOUNT
          	bool "Enable sus mount"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_SUS_KSTAT
          	bool "Enable sus kstat"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_SUS_OVERLAYFS
          	bool "Enable sus overlayfs"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_TRY_UMOUNT
          	bool "Enable try umount"
          	depends on KSU_SUSFS
          	default n
          
          config KSU_SUSFS_SPOOFER
          	bool "Enable spoofer"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_ENABLE_LOG
          	bool "Enable log"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_OPEN_REDIRECT
          	bool "Enable open redirect"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT
          	bool "Enable auto add sus bind mount"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND
          	bool "Enable auto add try umount for bind"
          	depends on KSU_SUSFS
          	default n
          
          config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          	bool "Hide KSU SUSFS symbols"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_SPOOF_BOOTCONFIG
          	bool "Spoof bootconfig"
          	depends on KSU_SUSFS
          	default y
          EOF
                    echo "Kconfig SUSFS ditambah"
                    grep -c "KSU_SUSFS" fs/Kconfig                     
      
      - name: Manual patch fs/open.c for SUSFS
        run: |
          cat > /tmp/patch_open.py << 'PYEOF'
          import sys
          
          with open('kernel/fs/open.c', 'r') as f:
              content = f.read()
          
          ok0 = ok1 = False
          
          old0 = '#include <linux/fs.h>'
          new0 = '#include <linux/fs.h>\n#include <linux/susfs.h>'
          if old0 in content:
              content = content.replace(old0, new0, 1)
              ok0 = True
              print("PATCH 0 OK: include susfs.h ditambah")
          else:
              print("WARNING patch 0 tidak ditemukan!")
          
          old1 = '\tunsigned int lookup_flags = LOOKUP_FOLLOW;\n\n\t// KernelSU - start'
          new1 = '\tunsigned int lookup_flags = LOOKUP_FOLLOW;\n\n\t// KernelSU - start'
          if old1 in content:
              ok1 = True
              print("PATCH 1 OK: konteks ditemukan, tidak perlu diubah")
          else:
              print("WARNING patch 1 tidak ditemukan!")
          
          if not ok0 or not ok1:
              sys.exit(1)
          
          with open('kernel/fs/open.c', 'w') as f:
              f.write(content)
          PYEOF
                    python3 /tmp/patch_open.py   
           
      - name: Setup defconfig KSUN
        run: |
          echo "CONFIG_KSU=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KPROBES=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_HAVE_KPROBES=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KALLSYMS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_UTS_NS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_IPC_NS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_USER_NS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_PID_NS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_NET_NS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_MODULES=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_LTO_NONE=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_NR_CPUS=8" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_NO_HZ_FULL=n" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_NO_HZ_IDLE=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_SCHED_BOOST=n" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_QCOM_PERF_BOOST=n" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_QTI_SCMI_PLAT=n" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_WALT=n" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_SCHED_DEBUG=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_MSM_GENI_IR=n" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=n" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOFER=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_WITH_KPROBES=n" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND=n" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_BOOTCONFIG=y" >> kernel/arch/arm64/configs/cepheus_defconfig
          echo 'CONFIG_LOCALVERSION="-TURTLE-SUSFS"' >> kernel/arch/arm64/configs/cepheus_defconfig
           
      - name: Patch WALT stub
        run: |
          cd kernel
          rm -f kernel/sched/walt.c
          rm -f kernel/sched/walt.h
      
          printf '%s\n' \
          '#ifndef _KERNEL_SCHED_WALT_H' \
          '#define _KERNEL_SCHED_WALT_H' \
          'struct rq; struct task_struct; struct sched_domain;' \
          'static inline void update_cluster_topology(void) {}' \
          'static inline void init_clusters(void) {}' \
          'static inline void walt_sched_init_rq(void *rq) {}' \
          'static inline void init_new_task_load(void *p) {}' \
          'static inline void walt_init_new_task_load(void *p) {}' \
          'static inline void walt_sched_fork(void *p) {}' \
          'static inline void walt_sched_exit(void *p) {}' \
          'static inline void walt_sched_idle_start(void) {}' \
          'static inline void walt_sched_idle_end(void) {}' \
          'static inline void update_task_ravg(void *a, void *b, int c, u64 d, u64 e) {}' \
          'static inline void set_window_start(void *rq) {}' \
          'static inline void walt_update_last_enqueue(void *p) {}' \
          'static inline void fixup_busy_time(void *p, int cpu) {}' \
          'static inline int do_pl_notif(void *rq) { return 0; }' \
          'static inline void mark_task_starting(void *p) {}' \
          'static inline void walt_update_task(struct task_struct *p, struct rq *rq, int flags) {}' \
          'static inline void inc_rq_walt_stats(struct rq *rq, struct task_struct *p) {}' \
          'static inline void dec_rq_walt_stats(struct rq *rq, struct task_struct *p) {}' \
          'static inline int sched_cpu_high_irqload(int cpu) { return 0; }' \
          'static inline int same_cluster(int src_cpu, int dst_cpu) { return 0; }' \
          '#define trace_sched_load_balance_skip_tasks(...) do {} while (0)' \
          '#ifndef FULL_THROTTLE_BOOST' \
          '#define FULL_THROTTLE_BOOST 0' \
          '#endif' \
          'static inline void walt_inc_cumulative_runnable_avg(void *rq, void *p) {}' \
          'static inline void walt_dec_cumulative_runnable_avg(void *rq, void *p) {}' \
          'static inline int sched_irqload(int cpu) { return 0; }' \
          'static inline int walt_big_tasks(int cpu) { return 0; }' \
          '#endif' \
          > kernel/sched/walt.h

          # Patch sysctl.c: hapus entry sched_upmigrate dan sched_downmigrate
          python3 << 'PYEOF'
          with open('kernel/sysctl.c', 'r') as f:
              content = f.read()
          
          # Bungkus 2 entry dengan ifdef
          old = '''\t{
          \t\t.procname\t= "sched_upmigrate",
          \t\t.data\t\t= &sysctl_sched_capacity_margin_up,
          \t\t.maxlen\t\t= sizeof(unsigned int) * MAX_MARGIN_LEVELS,
          \t\t.mode\t\t= 0644,
          \t\t.proc_handler\t= sched_updown_migrate_handler,
          \t},
          \t{
          \t\t.procname\t= "sched_downmigrate",
          \t\t.data\t\t= &sysctl_sched_capacity_margin_down,
          \t\t.maxlen\t\t= sizeof(unsigned int) * MAX_MARGIN_LEVELS,
          \t\t.mode\t\t= 0644,
          \t\t.proc_handler\t= sched_updown_migrate_handler,
          \t},'''
          
          new = '''#ifdef CONFIG_SCHED_WALT
          ''' + old + '''
          #endif'''
          
          if old in content:
              content = content.replace(old, new)
              print("PATCH OK: sched_updown_migrate_handler dibungkus ifdef")
          else:
              print("WARNING: pattern tidak ditemukan, cek manual!")
          
          with open('kernel/sysctl.c', 'w') as f:
              f.write(content)
          PYEOF
        
      - name: Debug WALT functions called
        run: |
          cd kernel
          echo "=== SEMUA FUNGSI WALT YANG DIPANGGIL ==="
          grep -rh 'walt_\|inc_rq_walt\|dec_rq_walt' kernel/sched/ \
            --include="*.c" \
             | grep -v '//' \
             | grep -oP '(?<!\w)(walt_\w+|inc_rq_walt\w*|dec_rq_walt\w*)(?=\s*\()' \
             | sort -u
          
      - name: Patch WALT stub
        run: |
          cd kernel
      
          # Hapus implementasi walt.c
          rm -f kernel/sched/walt.c
      
          # Patch rt.c: bungkus 2 call walt yang tidak punya guard
          sed -i 's/\twalt_inc_cumulative_runnable_avg(rq, p);/#ifdef CONFIG_SCHED_WALT\n\twalt_inc_cumulative_runnable_avg(rq, p);\n#endif/' kernel/sched/rt.c
          sed -i 's/\twalt_dec_cumulative_runnable_avg(rq, p);/#ifdef CONFIG_SCHED_WALT\n\twalt_dec_cumulative_runnable_avg(rq, p);\n#endif/' kernel/sched/rt.c
      
          # Patch deadline.c: bungkus 2 call walt yang tidak punya guard
          sed -i 's/\twalt_inc_cumulative_runnable_avg(rq_of_dl_rq(dl_rq), dl_task_of(dl_se));/#ifdef CONFIG_SCHED_WALT\n\twalt_inc_cumulative_runnable_avg(rq_of_dl_rq(dl_rq), dl_task_of(dl_se));\n#endif/' kernel/sched/deadline.c
          sed -i 's/\twalt_dec_cumulative_runnable_avg(rq_of_dl_rq(dl_rq), dl_task_of(dl_se));/#ifdef CONFIG_SCHED_WALT\n\twalt_dec_cumulative_runnable_avg(rq_of_dl_rq(dl_rq), dl_task_of(dl_se));\n#endif/' kernel/sched/deadline.c
      
          echo "=== Verifikasi patch rt.c ==="
          grep -n -A1 -B1 "CONFIG_SCHED_WALT" kernel/sched/rt.c | head -20
          echo "=== Verifikasi patch deadline.c ==="
          grep -n -A1 -B1 "CONFIG_SCHED_WALT" kernel/sched/deadline.c | head -20
           
      - name: Patch task_mmu.c for SUSFS
        run: |
          cd kernel/fs/proc
          grep -q "susfs.h" task_mmu.c || \
            sed -i '1i #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs.h>\n#endif' task_mmu.c
       
      - name: Add INODE_STATE_SUS_KSTAT to susfs_def.h
        run: |
          cd kernel/include/linux
          grep -q "INODE_STATE_SUS_KSTAT" susfs_def.h || \
            echo "#define INODE_STATE_SUS_KSTAT 2" >> susfs_def.h
      
      - name: Add SUSFS stubs
        run: |
          # Deklarasi fungsi di header
          echo 'bool susfs_is_current_ksu_domain(void);' >> kernel/include/linux/susfs.h
          echo 'bool susfs_is_current_zygote_domain(void);' >> kernel/include/linux/susfs.h
      
          # Implementasi stub di fs/
          cat > kernel/fs/susfs_stub.c << 'EOF'
          #include <linux/susfs.h>
      
          bool susfs_is_current_ksu_domain(void) { return false; }
          bool susfs_is_current_zygote_domain(void) { return false; }
          EOF
      
          # Tambahkan ke Makefile
          echo 'obj-y += susfs_stub.o' >> kernel/fs/Makefile
      
      - name: Fix susfs_init call
        run: |
          cat > /tmp/fix_susfs_init.py << 'PYEOF'
import re

with open('kernel/drivers/kernelsu/core_hook.c', 'r') as f:
    content = f.read()

if 'susfs.h' not in content:
    content = content.replace(
        '#include <linux/fs.h>',
        '#include <linux/fs.h>\n#ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs.h>\n#endif',
        1
    )
    print("OK: include susfs.h ditambah")

content = content.replace(
    'void ksu_core_init(void)\n{',
    'void ksu_core_init(void)\n{\n#ifdef CONFIG_KSU_SUSFS\n\tsusfs_init();\n#endif'
)
print("OK: susfs_init ditambah ke ksu_core_init")

with open('kernel/drivers/kernelsu/core_hook.c', 'w') as f:
    f.write(content)
PYEOF
          python3 /tmp/fix_susfs_init.py
          grep -n "susfs_init\|susfs.h" kernel/drivers/kernelsu/core_hook.c | head -10
     
      - name: Build kernel
        run: |
          cd kernel
          export PATH="$HOME/proton/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export LD=ld.lld
          export KCFLAGS="-Wno-error"
      
          # Nuclear fix: replace yamltree.c dengan stub kosong
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>
          
          struct dt_info;
          
          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF
          
          echo "yamltree.c replaced with stub"
          
          # Fix vdso32
          sed -i '/vdso32/d' arch/arm64/Makefile
          sed -i '/vdso32/d' arch/arm64/kernel/Makefile
          rm -rf arch/arm64/kernel/vdso32
      
          make O=out CC=clang LD=ld.lld cepheus_defconfig
          
          # Disable vdso
          sed -i 's/CONFIG_VDSO=y/# CONFIG_VDSO is not set/' out/.config
          sed -i 's/CONFIG_COMPAT_VDSO=y/# CONFIG_COMPAT_VDSO is not set/' out/.config
          
          make O=out CC=clang LD=ld.lld -j$(nproc) Image.gz-dtb
          
      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          # Jangan copy dtbo.img biar pake bawaan SparkOS
          # Copy modules kalau ada
          find kernel/out -name '*.ko' -exec cp {} AnyKernel3/modules/system/lib/modules/ \;
          cd AnyKernel3 && zip -r9 ../Cepheus-KSUN+SUSFS-Test.zip *

      - name: Upload artifact   
        uses: actions/upload-artifact@v4
        with:
            name: Cepheus-KSUN+SUSFS-Test
            path: |
              Cepheus-KSUN+SUSFS-Test.zip
              kernel/out/arch/arm64/boot/Image.gz-dtb
